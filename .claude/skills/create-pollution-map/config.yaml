# ============================================================
# 污染源企业分布图 — 配置文件示例（精简版）
#
# 只需填写与 defaults.yaml 的差异字段：
#   meta.title / subtitle / output_path
#   gaode.city / cache_file
#   enterprises
#
# 其他字段（map、risk_zones、categories、boundary）自动从 defaults.yaml 继承。
# 如需覆盖，在对应节点下显式写出即可。
#
# 运行：python create_map.py -c your_config.yaml
# ============================================================

meta:
  title: "福州市仓山区2026年重点污染源单位地理分布图"
  subtitle: "数据来源：福州市生态环境局2026年度环境监管重点单位名录  |  共15家  |  坐标：高德地图"
  output_path: "./福州_仓山区_2026_output.png"
  # dpi: 200  # 可选，默认 200

gaode:
  city: 福州
  cache_file: "./geocode_cache_福州.json"
  # key: ""        # 可选，默认从 GAODE_API_KEY 环境变量读取
  # rate_limit: 0.15  # 可选，默认 0.15

# 如需覆盖 defaults 中的类别配置，可在此写出：
# categories:
#   水环境:
#     display: "水环境重点排污"
#     color: "#CC0000"
#     marker: "o"

# 如需调整地图参数，可在此写出：
# map:
#   figsize: [18, 14]
#   zoom: 12
#   padding: 500
#   basemap_alpha: 0.95

enterprises:
  - name: "奥力根工具（福州）有限公司"
    address: "福州市仓山区金山工业区长埕路263号"
    label: "奥力根工具（福州）有限公司\n金山工业区长埕路263号"
    categories:
      - 水环境
    data_source: "福州市生态环境局2026年度环境监管重点单位名录"
    source_type: "official"
    data_date: "2026-03"
