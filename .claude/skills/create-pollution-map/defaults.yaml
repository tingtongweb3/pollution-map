# ============================================================
# 污染源企业分布图 — 默认配置模板
#
# 城市/区县 YAML 只需覆盖差异字段：
#   meta.title, meta.subtitle, meta.output_path
#   gaode.city, gaode.cache_file
#   enterprises
#
# 其余字段从此模板继承。
# ============================================================

meta:
  dpi: 200

map:
  figsize: [18, 14]
  padding: 500
  zoom: 12
  basemap_alpha: 0.95

gaode:
  key: ''
  rate_limit: 0.15

risk_zones:
  enabled: true
  radius_meters: 1000
  fill_color: '#FF4444'
  fill_alpha: 0.12
  edge_color: '#CC0000'
  edge_width: 0.8
  edge_alpha: 0.25

boundary:
  coords: []

categories:
  水环境:
    display: 水环境重点排污
    color: '#CC0000'
    marker: o
  大气环境:
    display: 大气环境重点排污
    color: '#FF2200'
    marker: o
  土壤污染:
    display: 土壤污染重点监管
    color: '#FF6600'
    marker: o
  环境风险:
    display: 环境风险重点管控
    color: '#9933CC'
    marker: o
  噪声:
    display: 噪声重点排污
    color: '#0066CC'
    marker: ^
  辐射安全:
    display: 辐射安全许可证
    color: '#9933CC'
    marker: '*'
  地下水:
    display: 地下水污染防治
    color: '#0099CC'
    marker: s
